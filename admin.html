<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AONE GLAMPING VILLA｜予約管理</title>
<meta name="description" content="予約管理画面（ポートフォリオ用デモ・架空施設・閲覧専用）。" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFEEE6; --card:#F8F7F1;
    --forest:#20302A; --forest-2:#2C4034;
    --sage:#7C8A77; --ember:#BC5A2C;
    --line:#D7D3C6;
    --r:4px; --r-lg:10px;
    --disp:"Shippori Mincho",serif;
    --body:"Zen Kaku Gothic New",sans-serif;
    --mono:"Space Mono",monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--forest);font-family:var(--body);font-size:14px;
    line-height:1.7;-webkit-font-smoothing:antialiased}
  .app{display:grid;grid-template-columns:232px 1fr;min-height:100vh}

  /* sidebar */
  .side{background:var(--forest);color:var(--paper);padding:26px 20px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
  .side .logo{font-family:var(--disp);font-weight:600;font-size:18px;letter-spacing:.02em}
  .side .logo small{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:#8aa091;margin-top:4px}
  .nav{margin-top:34px;display:flex;flex-direction:column;gap:2px}
  .nav a{display:flex;align-items:center;gap:11px;color:#c4cfc5;text-decoration:none;font-size:13.5px;
    padding:10px 12px;border-radius:var(--r);transition:background .15s,color .15s}
  .nav a:hover{background:var(--forest-2);color:var(--paper)}
  .nav a.on{background:var(--forest-2);color:var(--paper)}
  .nav a .dot{width:6px;height:6px;border-radius:50%;background:var(--ember);opacity:0;transition:.15s}
  .nav a.on .dot{opacity:1}
  .side .foot{margin-top:auto;font-family:var(--mono);font-size:10.5px;color:#6f8478;letter-spacing:.06em}
  .side .foot a{color:#8aa091}

  /* main */
  main{padding:30px 34px 60px;max-width:1180px}
  .demo-banner{background:#f0e2d6;border:1px solid #e0c4ad;color:#8a4a26;font-size:12.5px;
    border-radius:var(--r);padding:9px 14px;margin-bottom:22px;font-family:var(--body)}
  .head{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px}
  .head h1{font-family:var(--disp);font-weight:600;font-size:24px;margin:0}
  .head .date{font-family:var(--mono);font-size:12px;color:var(--sage)}

  /* KPI */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 18px}
  .kpi .l{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--sage)}
  .kpi .v{font-family:var(--mono);font-weight:700;font-size:28px;margin-top:6px}
  .kpi .v small{font-size:13px;color:var(--sage);font-weight:400;margin-left:3px}
  .kpi.accent .v{color:var(--ember)}

  /* toolbar */
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar input,.toolbar select{background:#fff;border:1px solid var(--line);border-radius:var(--r);
    padding:9px 12px;font-family:var(--body);font-size:13.5px;color:var(--forest)}
  .toolbar input{min-width:200px}
  .toolbar input:focus,.toolbar select:focus{outline:none;border-color:var(--forest)}
  .toolbar .spacer{margin-left:auto}
  .btn{appearance:none;border:1px solid var(--line);background:#fff;cursor:pointer;font-family:var(--body);
    font-size:13px;font-weight:700;color:var(--forest);border-radius:var(--r);padding:9px 15px;transition:.15s}
  .btn:hover{border-color:var(--forest)}
  .btn.primary{background:var(--forest);color:var(--paper);border-color:var(--forest)}
  .btn.primary:hover{filter:brightness(1.12)}

  /* table */
  .tablewrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{text-align:left;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--sage);font-weight:700;padding:13px 16px;border-bottom:1px solid var(--line);white-space:nowrap}
  tbody td{padding:13px 16px;border-bottom:1px solid #e6e3d8}
  tbody tr{cursor:pointer;transition:background .12s}
  tbody tr:hover{background:#edf0ea}
  tbody tr:last-child td{border-bottom:none}
  td.num{font-family:var(--mono)}
  .villa-tag{font-size:12px;color:var(--forest)}
  .badge{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.04em;
    padding:3px 9px;border-radius:999px;white-space:nowrap}
  .badge.todo{background:#f4e0d3;color:#a84e23}
  .badge.ok{background:#dde7dd;color:#2f4a37}
  .badge.cancel{background:#e8e6dc;color:#8d8a7c;text-decoration:line-through}
  .empty{padding:40px;text-align:center;color:var(--sage);font-size:13px}

  /* view toggle */
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:#fff}
  .seg button{appearance:none;border:none;background:none;cursor:pointer;font-family:var(--body);
    font-size:13px;font-weight:700;color:var(--sage);padding:9px 16px;transition:.15s}
  .seg button.on{background:var(--forest);color:var(--paper)}

  /* calendar */
  .cal{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px}
  .cal-bar{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .cal-bar .mlabel{font-family:var(--disp);font-size:19px;font-weight:600;min-width:150px}
  .cal-bar .nav{display:flex;gap:6px}
  .cal-bar .nav button{width:34px;height:34px;border:1px solid var(--line);background:#fff;border-radius:var(--r);
    cursor:pointer;font-size:15px;color:var(--forest);transition:.15s}
  .cal-bar .nav button:hover{border-color:var(--forest)}
  .cal-bar .legend{margin-left:auto;display:flex;gap:14px;font-family:var(--mono);font-size:10.5px;color:var(--sage);flex-wrap:wrap}
  .cal-bar .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:0}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
  .cal-dow{background:var(--card);font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;
    color:var(--sage);text-align:center;padding:8px 0;font-weight:700}
  .cal-dow.sun{color:#b5563f}.cal-dow.sat{color:#3f6f8f}
  .cell{background:#fff;min-height:108px;padding:6px 6px 8px;display:flex;flex-direction:column;gap:3px}
  .cell.out{background:#f3f2ec}
  .cell .d{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11.5px;color:var(--forest)}
  .cell .occ{font-size:9.5px;color:var(--sage)}
  .cell.full .occ{color:var(--ember);font-weight:700}
  .cell.today .d{color:var(--ember);font-weight:700}
  .cell.today{box-shadow:inset 0 0 0 2px var(--ember)}
  .chip{font-size:10.5px;line-height:1.45;padding:2px 6px;border-radius:3px;cursor:pointer;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:3px solid}
  .chip.todo{background:#f6e7da;border-color:#c4622f;color:#7c4422}
  .chip.ok{background:#e1eae0;border-color:#3f8f64;color:#2f4a37}
  .chip.more{font-family:var(--mono);font-size:9.5px;color:var(--sage);cursor:default;border:none;padding-left:6px}

  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(20,28,24,.45);display:none;z-index:40}
  .scrim.open{display:block}
  .drawer{position:fixed;top:0;right:-460px;width:440px;max-width:92vw;height:100vh;background:var(--paper);
    box-shadow:-16px 0 50px rgba(0,0,0,.25);transition:right .26s cubic-bezier(.4,0,.2,1);z-index:50;
    display:flex;flex-direction:column}
  .drawer.open{right:0}
  .drawer .dh{background:var(--forest);color:var(--paper);padding:22px 24px}
  .drawer .dh .cid{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:#8aa091}
  .drawer .dh .nm{font-family:var(--disp);font-size:21px;font-weight:600;margin-top:6px}
  .drawer .db{padding:22px 24px;overflow-y:auto;flex:1}
  .drawer dl{display:grid;grid-template-columns:96px 1fr;gap:11px 16px;margin:0}
  .drawer dt{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--sage);padding-top:2px}
  .drawer dd{margin:0;font-weight:500}
  .drawer dd.total{font-family:var(--mono);font-weight:700;font-size:18px;color:var(--ember)}
  .drawer .seclab{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--sage);margin:24px 0 12px}
  .statusrow{display:flex;gap:8px}
  .statusrow button{flex:1;border:1px solid var(--line);background:#fff;border-radius:var(--r);padding:10px;
    cursor:pointer;font-family:var(--body);font-size:12.5px;font-weight:700;color:var(--forest);transition:.15s}
  .statusrow button:hover{border-color:var(--forest)}
  .statusrow button.sel{background:var(--forest);color:var(--paper);border-color:var(--forest)}
  .drawer .dfoot{padding:16px 24px;border-top:1px solid var(--line);font-size:12px;color:var(--sage)}
  .x{margin-left:auto;background:none;border:none;color:#cdd6cd;font-size:22px;cursor:pointer;line-height:1}

  @media(max-width:880px){
    .app{grid-template-columns:1fr}
    .side{position:static;height:auto;flex-direction:row;align-items:center;gap:18px;padding:14px 18px}
    .side .logo small,.side .foot{display:none}.nav{flex-direction:row;margin:0 0 0 auto}
    .kpis{grid-template-columns:1fr 1fr}
    thead th:nth-child(4),tbody td:nth-child(4){display:none}
  }
  :focus-visible{outline:2px solid var(--ember);outline-offset:2px}
</style>
</head>
<body>
<div class="app">
  <!-- sidebar -->
  <aside class="side">
    <div class="logo">AONE<small>GLAMPING ADMIN</small></div>
    <nav class="nav">
      <a class="on" href="#"><span class="dot"></span>予約管理</a>
      <a href="#"><span class="dot"></span>棟・在庫</a>
      <a href="#"><span class="dot"></span>顧客</a>
      <a href="#"><span class="dot"></span>売上レポート</a>
      <a href="#"><span class="dot"></span>設定</a>
    </nav>
    <div class="foot">PORTFOLIO DEMO<br><a href="index.html">← 予約フォーム（お客様側）</a></div>
  </aside>

  <!-- main -->
  <main>
    <div class="demo-banner">📌 ポートフォリオ用デモ（架空施設・閲覧専用）。データはダミーで、変更は保存されません。</div>

    <div class="head">
      <h1>予約管理</h1>
      <span class="date" id="today"></span>
    </div>

    <!-- KPI -->
    <section class="kpis">
      <div class="kpi accent"><div class="l">本日チェックイン</div><div class="v" id="k-in">0<small>件</small></div></div>
      <div class="kpi"><div class="l">本日チェックアウト</div><div class="v" id="k-out">0<small>件</small></div></div>
      <div class="kpi"><div class="l">今週の予約</div><div class="v" id="k-week">0<small>件</small></div></div>
      <div class="kpi"><div class="l">本日の稼働</div><div class="v" id="k-occ">0<small>/5棟</small></div></div>
    </section>

    <!-- toolbar -->
    <div class="toolbar">
      <div class="seg" id="viewseg">
        <button data-v="list" class="on">一覧</button>
        <button data-v="cal">カレンダー</button>
      </div>
      <input type="search" id="q" placeholder="名前・予約番号で検索" />
      <select id="f-villa"><option value="">すべての棟</option><option>フォレストドーム</option><option>リバーサイドキャビン</option><option>プレミアムサウナヴィラ</option></select>
      <select id="f-status"><option value="">すべての状態</option><option value="todo">未対応</option><option value="ok">確認済</option><option value="cancel">キャンセル</option></select>
      <span class="spacer"></span>
      <button class="btn" id="csv">CSV出力</button>
    </div>

    <!-- calendar view -->
    <section id="calview" style="display:none">
      <div class="cal">
        <div class="cal-bar">
          <div class="nav"><button id="cal-prev" aria-label="前の月">‹</button><button id="cal-next" aria-label="次の月">›</button></div>
          <div class="mlabel" id="cal-label"></div>
          <div class="legend">
            <span><i style="background:#c4622f"></i>未対応</span>
            <span><i style="background:#3f8f64"></i>確認済</span>
            <span>セル右上＝稼働 / 全5棟</span>
          </div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </section>

    <!-- table -->
    <div class="tablewrap">
      <table>
        <thead><tr>
          <th>予約番号</th><th>お名前</th><th>棟</th><th>チェックイン</th><th>泊</th><th>人数</th><th>金額</th><th>状態</th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none">該当する予約はありません。</div>
    </div>
  </main>
</div>

<!-- drawer -->
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true">
  <div class="dh">
    <div style="display:flex;align-items:flex-start">
      <div><div class="cid" id="d-id"></div><div class="nm" id="d-name"></div></div>
      <button class="x" id="d-close" aria-label="閉じる">×</button>
    </div>
  </div>
  <div class="db">
    <dl>
      <dt>棟</dt><dd id="d-villa"></dd>
      <dt>日程</dt><dd id="d-dates"></dd>
      <dt>人数</dt><dd id="d-guests"></dd>
      <dt>オプション</dt><dd id="d-opts"></dd>
      <dt>電話</dt><dd id="d-tel"></dd>
      <dt>メール</dt><dd id="d-email"></dd>
      <dt>金額</dt><dd class="total" id="d-total"></dd>
    </dl>
    <div class="seclab">対応状況を変更</div>
    <div class="statusrow" id="d-status">
      <button data-s="todo">未対応</button>
      <button data-s="ok">確認済</button>
      <button data-s="cancel">キャンセル</button>
    </div>
  </div>
  <div class="dfoot">※デモのため、状態変更は画面上のみ反映され保存されません。</div>
</aside>

<script>
const yen = n => "¥" + n.toLocaleString("ja-JP");
const $ = s => document.querySelector(s);
const pad = n => String(n).padStart(2,"0");

// --- build dummy data relative to today so KPIs always make sense ---
const today = new Date(); today.setHours(0,0,0,0);
const iso = d => d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const addDays = (base,n)=>{const d=new Date(base);d.setDate(d.getDate()+n);return d;};
const VILLAS = {"フォレストドーム":24000,"リバーサイドキャビン":38000,"プレミアムサウナヴィラ":52000};
const NAMES = ["田中 陽子","佐藤 健","鈴木 美咲","高橋 大輔","渡辺 さくら","伊藤 涼","山本 翔","中村 ひかり","小林 拓海","加藤 萌","吉田 隼人","松本 結衣"];
const OPTS = [["夕食BBQセット"],["朝食ボックス","貸切サウナ60分"],[],["ペット同伴"],["夕食BBQセット","朝食ボックス"],["貸切サウナ60分"]];
const STATUS = {todo:"未対応",ok:"確認済",cancel:"キャンセル"};

// offsets in days from today for checkin (mix of past/today/future)
const offs = [0,0,1,2,-1,3,5,1,7,-2,4,2];
const nightsArr=[1,2,1,1,2,1,3,2,1,1,2,1];
const statArr=["todo","ok","todo","ok","ok","todo","ok","cancel","todo","ok","todo","ok"];
const villaKeys = Object.keys(VILLAS);

const data = NAMES.map((nm,i)=>{
  const villa = villaKeys[i%3];
  const nights = nightsArr[i];
  const ci = addDays(today, offs[i]);
  const adults = 1+(i%3), children = i%2;
  const opts = OPTS[i%OPTS.length];
  let total = VILLAS[villa]*nights;
  const OPT_PRICE={"夕食BBQセット":3500,"朝食ボックス":1500,"貸切サウナ60分":6000,"ペット同伴":4000};
  const PER_GUEST=new Set(["夕食BBQセット","朝食ボックス"]);
  opts.forEach(o=> total += PER_GUEST.has(o)? OPT_PRICE[o]*(adults+children)*nights : OPT_PRICE[o]*nights);
  return {
    id:"AO-"+(1043+i),
    name:nm, villa, ci, nights,
    co: addDays(ci,nights),
    adults, children, opts,
    tel:"090"+(10000000+i*734291).toString().slice(0,8),
    email:nm.split(" ")[0].toLowerCase().replace(/[^a-z]/g,"")+i+"@example.com",
    total, status:statArr[i]
  };
});

// KPIs
function refreshKpis(){
  const inToday = data.filter(r=>r.status!=="cancel" && iso(r.ci)===iso(today)).length;
  const outToday = data.filter(r=>r.status!=="cancel" && iso(r.co)===iso(today)).length;
  const weekEnd = addDays(today,7);
  const week = data.filter(r=>r.status!=="cancel" && r.ci>=today && r.ci<weekEnd).length;
  // 稼働 = 本日宿泊中の棟数（ci<=today<co）
  const occ = data.filter(r=>r.status!=="cancel" && r.ci<=today && today<r.co).length;
  $("#k-in").innerHTML = inToday+"<small>件</small>";
  $("#k-out").innerHTML = outToday+"<small>件</small>";
  $("#k-week").innerHTML = week+"<small>件</small>";
  $("#k-occ").innerHTML = occ+"<small>/5棟</small>";
}

// render table
function render(){
  const q=$("#q").value.trim().toLowerCase(), fv=$("#f-villa").value, fs=$("#f-status").value;
  const list = data
    .filter(r=> !q || r.name.toLowerCase().includes(q) || r.id.toLowerCase().includes(q))
    .filter(r=> !fv || r.villa===fv)
    .filter(r=> !fs || r.status===fs)
    .sort((a,b)=> a.ci-b.ci);
  const tb=$("#rows"); tb.innerHTML="";
  list.forEach(r=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td class="num">${r.id}</td><td>${r.name}</td>
      <td class="villa-tag">${r.villa}</td><td class="num">${iso(r.ci)}</td>
      <td class="num">${r.nights}</td><td class="num">${r.adults+r.children}</td>
      <td class="num">${yen(r.total)}</td>
      <td><span class="badge ${r.status}">${STATUS[r.status]}</span></td>`;
    tr.addEventListener("click",()=>openDrawer(r));
    tb.appendChild(tr);
  });
  $("#empty").style.display = list.length? "none":"block";
}

// drawer
let current=null;
function openDrawer(r){
  current=r;
  $("#d-id").textContent=r.id;
  $("#d-name").textContent=r.name+" 様";
  $("#d-villa").textContent=r.villa;
  $("#d-dates").textContent=iso(r.ci)+" 〜 "+iso(r.co)+"（"+r.nights+"泊）";
  $("#d-guests").textContent="大人 "+r.adults+" / 子供 "+r.children;
  $("#d-opts").textContent=r.opts.length? r.opts.join("、"):"なし";
  $("#d-tel").textContent=r.tel;
  $("#d-email").textContent=r.email;
  $("#d-total").textContent=yen(r.total);
  document.querySelectorAll("#d-status button").forEach(b=>b.classList.toggle("sel",b.dataset.s===r.status));
  $("#drawer").classList.add("open"); $("#scrim").classList.add("open");
}
function closeDrawer(){ $("#drawer").classList.remove("open"); $("#scrim").classList.remove("open"); }
$("#d-close").addEventListener("click",closeDrawer);
$("#scrim").addEventListener("click",closeDrawer);
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDrawer();});
document.querySelectorAll("#d-status button").forEach(b=>b.addEventListener("click",()=>{
  if(!current)return;
  current.status=b.dataset.s;
  document.querySelectorAll("#d-status button").forEach(x=>x.classList.toggle("sel",x===b));
  render(); refreshKpis(); renderCal();
}));

// CSV export
$("#csv").addEventListener("click",()=>{
  const head=["予約番号","お名前","棟","チェックイン","泊数","人数","金額","状態"];
  const lines=[head.join(",")].concat(data.map(r=>[
    r.id,r.name,r.villa,iso(r.ci),r.nights,r.adults+r.children,r.total,STATUS[r.status]
  ].join(",")));
  const blob=new Blob(["﻿"+lines.join("\n")],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="reservations_"+iso(today)+".csv"; a.click();
  URL.revokeObjectURL(a.href);
});

// filters
["q","f-villa","f-status"].forEach(id=>$("#"+id).addEventListener("input",()=>{render();renderCal();}));

// --- view toggle ---
let view="list";
document.querySelectorAll("#viewseg button").forEach(b=>b.addEventListener("click",()=>{
  view=b.dataset.v;
  document.querySelectorAll("#viewseg button").forEach(x=>x.classList.toggle("on",x===b));
  $(".tablewrap").style.display = view==="list"?"":"none";
  $("#calview").style.display = view==="cal"?"":"none";
  if(view==="cal") renderCal();
}));

// --- calendar ---
const VABBR={"フォレストドーム":"ドーム","リバーサイドキャビン":"キャビン","プレミアムサウナヴィラ":"サウナ"};
const DOW=["日","月","火","水","木","金","土"];
let calM=new Date(today.getFullYear(),today.getMonth(),1);

function filtered(){
  const q=$("#q").value.trim().toLowerCase(),fv=$("#f-villa").value,fs=$("#f-status").value;
  return data
    .filter(r=> !q || r.name.toLowerCase().includes(q) || r.id.toLowerCase().includes(q))
    .filter(r=> !fv || r.villa===fv)
    .filter(r=> !fs || r.status===fs);
}
function renderCal(){
  $("#cal-label").textContent = calM.getFullYear()+"年 "+(calM.getMonth()+1)+"月";
  const grid=$("#cal-grid"); grid.innerHTML="";
  DOW.forEach((d,i)=>{const h=document.createElement("div");h.className="cal-dow"+(i===0?" sun":i===6?" sat":"");h.textContent=d;grid.appendChild(h);});
  const first=new Date(calM), start=new Date(calM); start.setDate(1-first.getDay());
  const list=filtered().filter(r=>r.status!=="cancel"); // 宿泊実体のみ
  for(let i=0;i<42;i++){
    const d=addDays(start,i);
    const cell=document.createElement("div");
    const out=d.getMonth()!==calM.getMonth();
    cell.className="cell"+(out?" out":"");
    if(iso(d)===iso(today)) cell.classList.add("today");
    // その夜に宿泊している予約（ci <= d < co）
    const stays=list.filter(r=> r.ci<=d && d<r.co);
    if(stays.length>=5) cell.classList.add("full");
    const head=document.createElement("div"); head.className="d";
    head.innerHTML=`<span>${d.getDate()}</span><span class="occ">${stays.length}/5</span>`;
    cell.appendChild(head);
    stays.slice(0,3).forEach(r=>{
      const c=document.createElement("div");
      c.className="chip "+r.status;
      c.textContent=VABBR[r.villa]+"・"+r.name.split(" ")[0];
      c.title=r.name+" 様／"+r.villa+"（"+iso(r.ci)+"〜"+iso(r.co)+"）";
      c.addEventListener("click",()=>openDrawer(r));
      cell.appendChild(c);
    });
    if(stays.length>3){const m=document.createElement("div");m.className="chip more";m.textContent="+"+(stays.length-3)+"件";cell.appendChild(m);}
    grid.appendChild(cell);
  }
}
$("#cal-prev").addEventListener("click",()=>{calM.setMonth(calM.getMonth()-1);renderCal();});
$("#cal-next").addEventListener("click",()=>{calM.setMonth(calM.getMonth()+1);renderCal();});

$("#today").textContent="本日 "+iso(today);
refreshKpis(); render();
if(location.hash==="#cal"){ document.querySelector('#viewseg button[data-v="cal"]').click(); }
</script>
</body>
